# ============================================
# Seminar CMS — Docker Compose
# ============================================
# 啟動: docker compose up -d --build
# 停止: docker compose down
# 看 log: docker compose logs -f app
# Seed 資料: docker compose run --rm migrate npx tsx prisma/seed.ts
# 備份 DB: docker compose exec db pg_dump -U postgres seminar_cms > backup.sql
# ============================================

services:
  # ── PostgreSQL 資料庫 ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres        # ⚠️ 正式環境請改密碼
      POSTGRES_DB: seminar_cms
    volumes:
      - pgdata:/var/lib/postgresql/data  # DB 資料持久化
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── 自動建立資料表（啟動時執行一次）──
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/seminar_cms
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma db push --skip-generate
    restart: "no"

  # ── Next.js 應用程式 ──
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"                      # 網站在 http://localhost:3000
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/seminar_cms  # 覆蓋 .env 裡的 localhost
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads             # 上傳檔案持久化
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:    # PostgreSQL 資料
  uploads:   # 使用者上傳的圖片/影片
